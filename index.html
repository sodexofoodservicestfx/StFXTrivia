<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STFX Trivia Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


body{

    background:
    linear-gradient(
        rgba(0,40,90,.75),
        rgba(0,27,68,.85)
    ),
    url("stfxcampus.jpg");

    background-size:cover;
    background-position:center;

    width:100%;
    height:100vh;

    position:relative;
    overflow:hidden;
}


/* Background Decorative Circles */

body::before,
body::after{

    content:"";

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,.06);

}


body::before{

    width:350px;

    height:350px;

    top:-120px;

    right:-120px;

}


body::after{

    width:250px;

    height:250px;

    bottom:-80px;

    left:-80px;

}



/* Main Box */

.container{

    width:90%;

    max-width:800px;

    background:white;

    border-radius:30px;

    padding:35px;

    box-shadow:0 25px 60px rgba(0,0,0,.25);

    position:relative;

    z-index:1;

}



/* ========================= */
/* LOGOS */
/* ========================= */

.logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    margin-bottom:25px;
}

.logos img{
    height:75px;
    width:auto;
    max-width:300px;
    object-fit:contain;
    image-rendering:auto;
    display:block;
}
.sodexo-logo{
    height:65px !important;
}


/* ========================= */
/* WELCOME SCREEN */
/* ========================= */

.welcome{

    text-align:center;

    padding:40px 20px;

}


.welcome h1{

    color:#003A70;

    font-size:38px;

    margin-bottom:20px;

}


.welcome p{

    color:#555;

    font-size:20px;

    margin-bottom:40px;

}



/* ========================= */
/* HEADER */
/* ========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

}


.header h1{

    color:#003A70;

    font-size:34px;

}



/* ========================= */
/* PROGRESS */
/* ========================= */

.progressText{

    color:#666;

    margin-bottom:10px;

}


.progressBar{

    width:100%;

    height:12px;

    background:#ddd;

    border-radius:50px;

    overflow:hidden;

    margin-bottom:35px;

}


.progress{

    height:100%;

    width:0%;

    background:linear-gradient(to right,#4CAF50,#8BC34A);

    transition:.3s;

}



/* ========================= */
/* QUESTION */
/* ========================= */

.question{

    font-size:30px;

    font-weight:600;

    color:#222;

    margin-bottom:30px;

}



/* ========================= */
/* ANSWERS */
/* ========================= */

.answers{

    display:grid;

    gap:18px;

}


.answer{

    border:none;

    background:#F4F6F8;

    padding:22px;

    border-radius:18px;

    font-size:20px;

    cursor:pointer;

    text-align:left;

    border:3px solid transparent;

    transition:.25s;

}


.answer:hover{

    transform:translateY(-4px);

    border-color:#0057B8;

    background:#EEF5FF;

}


.answer.selected{

    border-color:#0057B8;

    background:#EEF5FF;

}



/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

    margin-top:40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.buttons{

    display:flex;

    gap:15px;

}


.next{

    background:#0057B8;

    color:white;

    border:none;

    padding:15px 35px;

    border-radius:40px;

    cursor:pointer;

    font-size:18px;

    font-weight:600;

    transition:.25s;

}


.next:hover{

    background:#003A70;

    transform:scale(1.05);

}


.logo{

    color:#888;

    font-size:15px;

}



/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:600px){

    .container{

        padding:20px;

    }


    .welcome{

        padding:25px 10px;

    }


    .welcome h1{

        font-size:28px;

    }


    .welcome p{

        font-size:17px;

    }


    .logos{

        gap:20px;

    }


    .logos img{

        height:55px;

    }


    .sodexo-logo{

        height:48px !important;

    }


    .question{

        font-size:23px;

    }


    .answer{

        padding:17px;

        font-size:17px;

    }


    .footer{

        flex-direction:column;

        gap:20px;

    }


    .header h1{

        font-size:27px;

    }

}

</style>

</head>


<body>


<div class="container">


<!-- ========================= -->
<!-- WELCOME SCREEN -->
<!-- ========================= -->

<div class="welcome" id="welcome">


    <!-- LOGOS -->

    <div class="logos">

        <img src="STFXlogo.png" alt="StFX Logo">

        <img src="logo.png" alt="Sodexo Logo" class="sodexo-logo">

    </div>


    <h1>
        🏛️ Welcome to STFX Trivia
    </h1>


    <p>
        Test your knowledge of StFX, Sodexo, campus life, and more!
    </p>


    <button class="next" onclick="startTrivia()">

        Start Trivia →

    </button>


</div>



<!-- ========================= -->
<!-- QUIZ SCREEN -->
<!-- ========================= -->

<div id="quiz" style="display:none;">


    <div class="header">

        <h1>
            🏛️ STFX Trivia
        </h1>

    </div>



    <!-- PROGRESS TEXT -->

    <div class="progressText" id="progressText">

    </div>



    <!-- PROGRESS BAR -->

    <div class="progressBar">

        <div class="progress" id="progress"></div>

    </div>



    <!-- QUESTION -->

    <div class="question" id="question">

    </div>



    <!-- ANSWERS -->

    <div class="answers" id="answers">

    </div>



    <!-- FOOTER -->

    <div class="footer">


        <div class="logo">

            Powered by Sodexo & StFX

        </div>



        <div class="buttons">


            <button class="next" id="back">

                ← Back

            </button>



            <button class="next" id="next">

                Next →

            </button>


        </div>


    </div>


</div>



</div>



<script>


/* ========================= */
/* QUESTIONS */
/* ========================= */


const questions = [


    {

        question:"Which building houses the main dining hall at StFX?",

        answers:[

            "🏛️ Morrison Hall",

            "📚 Angus L. Macdonald Library",

            "🏢 Mulroney Hall",

            "🏠 Bishop's Hall"

        ],

        correct:0

    },


    {

        question:"What does STFX stand for?",

        answers:[

            "Saint Francis Xavier University",

            "St Thomas Francis Xavier College",

            "Saint Frederick Xavier School",

            "Southern Technical Faculty Xavier"

        ],

        correct:0

    },


    {

        question:"Who provides food services at StFX?",

        answers:[

            "🍔 McDonald's",

            "🍽️ Sodexo",

            "☕ Starbucks",

            "🥗 Aramark"

        ],

        correct:1

    },


    {

        question:"What province is StFX located in?",

        answers:[

            "Ontario",

            "Nova Scotia",

            "Alberta",

            "British Columbia"

        ],

        correct:1

    },


    {

        question:"What are the official StFX school colours?",

        answers:[

            "🔵 Blue and White",

            "🔴 Red and Black",

            "🟢 Green and Gold",

            "🟣 Purple and Silver"

        ],

        correct:0

    }


];



/* ========================= */
/* VARIABLES */
/* ========================= */


let currentQuestion = 0;

let selectedAnswers = [];



/* ========================= */
/* START TRIVIA */
/* ========================= */


function startTrivia(){

    document.getElementById("welcome").style.display = "none";

    document.getElementById("quiz").style.display = "block";

    loadQuestion();

}



/* ========================= */
/* LOAD QUESTION */
/* ========================= */


function loadQuestion(){


    let q = questions[currentQuestion];


    document.getElementById("question").innerHTML = q.question;


    document.getElementById("progressText").innerHTML =

        "Question " +

        (currentQuestion + 1) +

        " of " +

        questions.length;


    document.getElementById("progress").style.width =

        ((currentQuestion + 1) / questions.length) * 100 + "%";


    let html = "";


    q.answers.forEach((answer,index)=>{


        html += `

            <button

                class="answer"

                onclick="selectAnswer(${index})">

                ${answer}

            </button>

        `;


    });


    document.getElementById("answers").innerHTML = html;



    /* Restore Previous Answer */

    if(selectedAnswers[currentQuestion] !== undefined){


        document

        .querySelectorAll(".answer")

        [selectedAnswers[currentQuestion]]

        .classList

        .add("selected");


    }



    /* Show / Hide Back Button */


    if(currentQuestion === 0){

        document.getElementById("back").style.display = "none";

    }

    else{

        document.getElementById("back").style.display = "block";

    }


}



/* ========================= */
/* SELECT ANSWER */
/* ========================= */


function selectAnswer(index){


    selectedAnswers[currentQuestion] = index;


    document

    .querySelectorAll(".answer")

    .forEach(btn=>{

        btn.classList.remove("selected");

    });


    document

    .querySelectorAll(".answer")

    [index]

    .classList

    .add("selected");


}



/* ========================= */
/* NEXT BUTTON */
/* ========================= */


document.getElementById("next").onclick = function(){


    if(selectedAnswers[currentQuestion] === undefined){


        alert("Please select an answer!");


        return;


    }



    if(currentQuestion < questions.length - 1){


        currentQuestion++;


        loadQuestion();


    }



    else{


        let score = 0;



        questions.forEach((q,index)=>{


            if(selectedAnswers[index] === q.correct){

                score++;

            }


        });



        document.querySelector(".container").innerHTML = `


            <div class="welcome">


                <div class="logos">


                    <img src="STFXlog.png" alt="StFX Logo">


                    <img

                        src="logo.png"

                        alt="Sodexo Logo"

                        class="sodexo-logo">


                </div>



                <h1>

                    🎉 Trivia Complete!

                </h1>



                <p>

                    Your Score: ${score}/${questions.length}

                </p>



                <button

                    class="next"

                    onclick="location.reload()">


                    Play Again →


                </button>


            </div>


        `;


    }


};





/* ========================= */
/* BACK BUTTON */
/* ========================= */


document.getElementById("back").onclick = function(){


    if(currentQuestion > 0){


        currentQuestion--;


        loadQuestion();


    }


};


</script>


</body>

</html>
