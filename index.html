<style>

/* ========================= */
/* GENERAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


/* ========================= */
/* BODY */
/* ========================= */

body{

    background:
    linear-gradient(
        rgba(0,40,90,.75),
        rgba(0,27,68,.85)
    ),
    url("stfxcampus.jpg");

    background-size:cover;
    background-position:center;

    width:100%;
    height:100vh;

    position:relative;

    overflow:hidden;

}


/* ========================= */
/* DECORATIVE CIRCLES */
/* ========================= */

body::before,
body::after{

    content:"";

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,.06);

    pointer-events:none;

}


body::before{

    width:350px;
    height:350px;

    top:-120px;
    right:-120px;

}


body::after{

    width:250px;
    height:250px;

    bottom:-80px;
    left:-80px;

}


/* ========================= */
/* MAIN CONTAINER */
/* ========================= */

.container{

    width:90%;
    max-width:850px;

    background:white;

    border-radius:30px;

    padding:35px;

    box-shadow:0 25px 60px rgba(0,0,0,.25);

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:1;

    max-height:92vh;

    overflow:hidden;

}


/* ========================= */
/* LOGOS */
/* ========================= */

.logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:35px;

    margin-bottom:25px;

}


.logos img{

    height:75px;

    width:auto;

    max-width:300px;

    object-fit:contain;

}


.sodexo-logo{

    height:65px !important;

}


/* ========================= */
/* WELCOME SCREEN */
/* ========================= */

.welcome{

    text-align:center;

    padding:30px 20px;

}


.welcome h1{

    color:#003A70;

    font-size:38px;

    margin-bottom:15px;

}


.welcome p{

    color:#555;

    font-size:20px;

    margin-bottom:35px;

}


/* ========================= */
/* CATEGORY SCREEN */
/* ========================= */

.category-screen{

    text-align:center;

}


.category-screen h1{

    color:#003A70;

    font-size:32px;

    margin-bottom:8px;

}


.category-screen p{

    color:#666;

    margin-bottom:25px;

}


.category-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:12px;

}


.category-button{

    border:none;

    background:#F4F6F8;

    border:3px solid transparent;

    border-radius:18px;

    padding:16px 12px;

    font-size:18px;

    font-weight:600;

    color:#003A70;

    cursor:pointer;

    transition:.25s;

}


.category-button:hover{

    background:#EEF5FF;

    border-color:#0057B8;

    transform:translateY(-3px);

}


/* ========================= */
/* BUTTONS */
/* ========================= */

.next{

    background:#0057B8;

    color:white;

    border:none;

    padding:15px 35px;

    border-radius:40px;

    cursor:pointer;

    font-size:18px;

    font-weight:600;

    transition:.25s;

}


.next:hover{

    background:#003A70;

    transform:scale(1.05);

}


/* ========================= */
/* QUIZ HEADER */
/* ========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}


.header h1{

    color:#003A70;

    font-size:30px;

}


/* ========================= */
/* PROGRESS */
/* ========================= */

.progressText{

    color:#666;

    margin-bottom:8px;

}


.progressBar{

    width:100%;

    height:12px;

    background:#ddd;

    border-radius:50px;

    overflow:hidden;

    margin-bottom:25px;

}


.progress{

    height:100%;

    width:0%;

    background:linear-gradient(to right,#4CAF50,#8BC34A);

    transition:.3s;

}


/* ========================= */
/* QUESTION */
/* ========================= */

.question{

    font-size:27px;

    font-weight:600;

    color:#222;

    margin-bottom:25px;

}


/* ========================= */
/* ANSWERS */
/* ========================= */

.answers{

    display:grid;

    gap:12px;

}


.answer{

    border:none;

    background:#F4F6F8;

    padding:17px;

    border-radius:15px;

    font-size:18px;

    cursor:pointer;

    text-align:left;

    border:3px solid transparent;

    transition:.25s;

}


.answer:hover{

    transform:translateY(-3px);

    border-color:#0057B8;

    background:#EEF5FF;

}


.answer.selected{

    border-color:#0057B8;

    background:#EEF5FF;

}


/* ========================= */
/* MATRIX */
/* ========================= */

.matrix{

    display:inline-block;

    font-family:monospace;

    font-size:26px;

    line-height:1.4;

    margin-top:15px;

    padding:10px 20px;

    border-left:3px solid #222;

    border-right:3px solid #222;

}


/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

    margin-top:25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.bottom-logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;

}


.bottom-logos img{

    height:35px !important;

    width:auto !important;

    max-width:90px !important;

    object-fit:contain;

}


.bottom-logos img.sodexo-bottom{

    height:28px !important;

}


/* ========================= */
/* BUTTON GROUP */
/* ========================= */

.buttons{

    display:flex;

    gap:12px;

}


#back{

    display:none;

}


/* ========================= */
/* RESULTS */
/* ========================= */

.results-screen{

    text-align:center;

}


.results-screen .logos{

    margin-bottom:15px;

}


.results-screen h1{

    color:#003A70;

    font-size:30px;

    margin-bottom:8px;

}


.score{

    font-size:23px;

    font-weight:600;

    color:#0057B8;

    margin-bottom:15px;

}


.results-list{

    display:flex;

    flex-direction:column;

    gap:7px;

    margin-bottom:18px;

    text-align:left;

}


.result-item{

    padding:8px 12px;

    border-radius:10px;

    border-left:5px solid;

}


.correct-result{

    background:#EAF7EA;

    border-left-color:#4CAF50;

}


.incorrect-result{

    background:#FFF0F0;

    border-left-color:#E53935;

}


.result-question{

    font-size:13px;

    font-weight:600;

    color:#222;

    margin-bottom:2px;

}


.result-answer{

    font-size:12px;

    color:#555;

}

    color:#2E7D32;

    margin-top:2px;

/* ========================= */

    }


    .welcome p{

    }


    .question{

    }


    .answer{

        padding:13px;

        font-size:16px;

    }


    .footer{

        flex-direction:column;

        gap:15px;

    }


    .header h1{

        font-size:24px;

    }

</style>

                "Geographic Positioning Service"
            ],

            correct:0
        },


        {
            question:"Which company created the PlayStation?",

            answers:[
                "Microsoft",
                "Nintendo",
                "Sony",
                "Sega"
            ],

            correct:2
        }

    ]

}

};



/* ================================================= */
/* VARIABLES */
/* ================================================= */


let currentCategory = "";

let currentQuestion = 0;

let selectedAnswers = [];

let inactivityTimer = null;



/* ================================================= */
/* START BUTTON */
/* ================================================= */


document.getElementById("startButton").addEventListener("click",function(){

    document.getElementById("welcome").style.display = "none";

    document.getElementById("categoryScreen").style.display = "block";

});



/* ================================================= */
/* CATEGORY BUTTONS */
/* ================================================= */


document.querySelectorAll(".category-button").forEach(function(button){

    button.addEventListener("click",function(){

        const category = button.dataset.category;

        startTrivia(category);

    });

});



/* ================================================= */
/* START TRIVIA */
/* ================================================= */


function startTrivia(category){

    currentCategory = category;

    currentQuestion = 0;

    selectedAnswers = [];


    document.getElementById("categoryScreen").style.display = "none";

    document.getElementById("quiz").style.display = "block";


    document.getElementById("categoryTitle").textContent =

        categories[category].title;


    loadQuestion();


    resetInactivityTimer();

}



/* ================================================= */
/* TIMER */
/* ================================================= */


function resetInactivityTimer(){

    clearTimeout(inactivityTimer);


    inactivityTimer = setTimeout(function(){

        returnToHome();

    },60000);

}



/* ================================================= */
/* RETURN TO CATEGORY SCREEN */
/* ================================================= */


function returnToHome(){

    clearTimeout(inactivityTimer);

    inactivityTimer = null;


    currentCategory = "";

    currentQuestion = 0;

    selectedAnswers = [];


    document.getElementById("quiz").style.display = "none";

    document.getElementById("categoryScreen").style.display = "block";

}



/* ================================================= */
/* LOAD QUESTION */
/* ================================================= */


function loadQuestion(){

    const q =

        categories[currentCategory].questions[currentQuestion];


    document.getElementById("question").innerHTML =

        q.question +

        (q.matrix ? "<br>" + q.matrix : "");


    document.getElementById("progressText").textContent =

        "Question " +

        (currentQuestion + 1) +

        " of 5";


    document.getElementById("progress").style.width =

        ((currentQuestion + 1) / 5) * 100 + "%";


    const answersContainer =

        document.getElementById("answers");


    answersContainer.innerHTML = "";


    q.answers.forEach(function(answer,index){

        const button =

            document.createElement("button");


        button.className = "answer";


        button.textContent = answer;


        button.addEventListener("click",function(){

            selectAnswer(index);

        });


        answersContainer.appendChild(button);

    });


    /* Restore selected answer */

    if(selectedAnswers[currentQuestion] !== undefined){

        const buttons =

            document.querySelectorAll(".answer");


        buttons[

            selectedAnswers[currentQuestion]

        ].classList.add("selected");

    }


    /* Back button */

    if(currentQuestion === 0){

        document.getElementById("back").style.display = "none";

    }

    else{

        document.getElementById("back").style.display = "block";

    }

}



/* ================================================= */
/* SELECT ANSWER */
/* ================================================= */


function selectAnswer(index){

    selectedAnswers[currentQuestion] = index;


    const buttons =

        document.querySelectorAll(".answer");


    buttons.forEach(function(button){

        button.classList.remove("selected");

    });


    buttons[index].classList.add("selected");


    resetInactivityTimer();

}



/* ================================================= */
/* NEXT BUTTON */
/* ================================================= */


document.getElementById("next").addEventListener("click",function(){

    resetInactivityTimer();


    if(selectedAnswers[currentQuestion] === undefined){

        alert("Please select an answer!");

        return;

    }


    if(

        currentQuestion <

        categories[currentCategory].questions.length - 1

    ){

        currentQuestion++;

        loadQuestion();

        return;

    }


    finishQuiz();

});



/* ================================================= */
/* FINISH QUIZ */
/* ================================================= */


function finishQuiz(){

    clearTimeout(inactivityTimer);


    const questions =

        categories[currentCategory].questions;


    let score = 0;

    let resultsHTML = "";


    questions.forEach(function(q,index){

        const userAnswer =

            q.answers[selectedAnswers[index]];


        const correctAnswer =

            q.answers[q.correct];


        const isCorrect =

            selectedAnswers[index] === q.correct;


        if(isCorrect){

            score++;

        }


        resultsHTML += `

            <div class="result-item ${

                isCorrect

                ? "correct-result"

                : "incorrect-result"

            }">


                <div class="result-question">

                    ${isCorrect ? "✅" : "❌"}

                    ${q.question}

                </div>


                <div class="result-answer">

                    <strong>Your answer:</strong>

                    ${userAnswer}

                </div>


                ${

                    !isCorrect

                    ? `

                        <div class="correct-answer">

                            <strong>Correct answer:</strong>

                            ${correctAnswer}

                        </div>

                    `

                    : ""

                }


            </div>

        `;

    });


    document.getElementById("container").innerHTML = `

        <div class="results-screen">


            <div class="logos">

                <img

                    src="STFXlogo.png"

                    alt="StFX Logo">


                <img

                    src="logo.png"

                    alt="Sodexo Logo"

                    class="sodexo-logo">

            </div>


            <h1>

                🎉 ${categories[currentCategory].title}

                Complete!

            </h1>


            <div class="score">

                Your Score:

                ${score}/5

            </div>


            <div class="results-list">

                ${resultsHTML}

            </div>


            <button

                class="next"

                id="playAgain">

                Choose Another Category →

            </button>


        </div>

    `;


    /* 60-second results timer */

    inactivityTimer = setTimeout(function(){

        location.reload();

    },60000);


    /* Choose another category */

    document

    .getElementById("playAgain")

    .addEventListener("click",function(){

        clearTimeout(inactivityTimer);

        location.reload();

    });

}



/* ================================================= */
/* BACK BUTTON */
/* ================================================= */


document.getElementById("back").addEventListener("click",function(){

    resetInactivityTimer();


    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();

    }

});

</script>


</body>

</html>
