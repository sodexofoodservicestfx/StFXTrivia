<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STFX Trivia Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>

/* ========================= */
/* GENERAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


/* ========================= */
/* BODY */
/* ========================= */

body{

    background:
    linear-gradient(
        rgba(0,40,90,.75),
        rgba(0,27,68,.85)
    ),
    url("stfxcampus.jpg");

    background-size:cover;

    background-position:center;

    width:100%;

    height:100vh;

    position:relative;

    overflow:hidden;

}


/* ========================= */
/* BACKGROUND DECORATIVE CIRCLES */
/* ========================= */

body::before,
body::after{

    content:"";

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,.06);

}


body::before{

    width:350px;

    height:350px;

    top:-120px;

    right:-120px;

}


body::after{

    width:250px;

    height:250px;

    bottom:-80px;

    left:-80px;

}


/* ========================= */
/* MAIN BOX */
/* ========================= */

.container{

    width:90%;

    max-width:800px;

    background:white;

    border-radius:30px;

    padding:35px;

    box-shadow:0 25px 60px rgba(0,0,0,.25);

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%, -50%);

    z-index:1;

}


/* ========================= */
/* TOP LOGOS */
/* ========================= */

.logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:35px;

    margin-bottom:25px;

}


.logos img{

    height:75px;

    width:auto;

    max-width:300px;

    object-fit:contain;

}


.sodexo-logo{

    height:65px !important;

}


/* ========================= */
/* BOTTOM LOGOS */
/* ========================= */

.bottom-logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:20px;

    width:200px;

    height:50px;

}


.bottom-logos img{

    height:40px !important;

    width:auto !important;

    max-width:100px !important;

    object-fit:contain;

}


.bottom-logos img.sodexo-bottom{

    height:32px !important;

    width:auto !important;

    max-width:100px !important;

}


/* ========================= */
/* WELCOME SCREEN */
/* ========================= */

.welcome{

    text-align:center;

    padding:40px 20px;

}


.welcome h1{

    color:#003A70;

    font-size:38px;

    margin-bottom:20px;

}


.welcome p{

    color:#555;

    font-size:20px;

    margin-bottom:40px;

}


/* ========================= */
/* HEADER */
/* ========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

}


.header h1{

    color:#003A70;

    font-size:34px;

}


/* ========================= */
/* PROGRESS */
/* ========================= */

.progressText{

    color:#666;

    margin-bottom:10px;

}


.progressBar{

    width:100%;

    height:12px;

    background:#ddd;

    border-radius:50px;

    overflow:hidden;

    margin-bottom:35px;

}


.progress{

    height:100%;

    width:0%;

    background:linear-gradient(to right,#4CAF50,#8BC34A);

    transition:.3s;

}


/* ========================= */
/* QUESTION */
/* ========================= */

.question{

    font-size:30px;

    font-weight:600;

    color:#222;

    margin-bottom:30px;

}


/* ========================= */
/* ANSWERS */
/* ========================= */

.answers{

    display:grid;

    gap:18px;

}


.answer{

    border:none;

    background:#F4F6F8;

    padding:22px;

    border-radius:18px;

    font-size:20px;

    cursor:pointer;

    text-align:left;

    border:3px solid transparent;

    transition:.25s;

}


.answer:hover{

    transform:translateY(-4px);

    border-color:#0057B8;

    background:#EEF5FF;

}


.answer.selected{

    border-color:#0057B8;

    background:#EEF5FF;

}


/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

    margin-top:40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}


.buttons{

    display:flex;

    gap:15px;

}


.next{

    background:#0057B8;

    color:white;

    border:none;

    padding:15px 35px;

    border-radius:40px;

    cursor:pointer;

    font-size:18px;

    font-weight:600;

    transition:.25s;

}


.next:hover{

    background:#003A70;

    transform:scale(1.05);

}


/* ========================= */
/* RESULTS SCREEN */
/* ========================= */

.results-screen{

    text-align:center;

}


.results-screen .logos{

    margin-bottom:15px;

}


.results-screen h1{

    color:#003A70;

    font-size:32px;

    margin-bottom:8px;

}


.score{

    font-size:24px;

    font-weight:600;

    color:#0057B8;

    margin-bottom:18px;

}


.results-list{

    display:flex;

    flex-direction:column;

    gap:8px;

    margin-bottom:20px;

    text-align:left;

}


.result-item{

    padding:9px 14px;

    border-radius:10px;

    border-left:5px solid;

}


.correct-result{

    background:#EAF7EA;

    border-left-color:#4CAF50;

}


.incorrect-result{

    background:#FFF0F0;

    border-left-color:#E53935;

}


.result-question{

    font-size:14px;

    font-weight:600;

    color:#222;

    margin-bottom:3px;

}


.result-answer{

    font-size:13px;

    color:#555;

}


.correct-answer{

    font-size:13px;

    color:#2E7D32;

    margin-top:2px;

}


/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:600px){

    .container{

        width:90%;

        padding:20px;

    }


    .welcome{

        padding:25px 10px;

    }


    .welcome h1{

        font-size:28px;

    }


    .welcome p{

        font-size:17px;

    }


    .logos{

        gap:20px;

    }


    .logos img{

        height:55px;

    }


    .sodexo-logo{

        height:48px !important;

    }


    .question{

        font-size:23px;

    }


    .answer{

        padding:17px;

        font-size:17px;

    }


    .footer{

        flex-direction:column;

        gap:20px;

    }


    .header h1{

        font-size:27px;

    }


    .bottom-logos{

        width:200px;

        height:45px;

    }


    .bottom-logos img{

        height:35px !important;

        max-width:90px !important;

    }


    .bottom-logos img.sodexo-bottom{

        height:28px !important;

    }

}

</style>

</head>


<body>


<div class="container">


<!-- ========================= -->
<!-- WELCOME SCREEN -->
<!-- ========================= -->

<div class="welcome" id="welcome">


    <div class="logos">

        <img src="STFXlogo.png" alt="StFX Logo">

        <img src="logo.png" alt="Sodexo Logo" class="sodexo-logo">

    </div>


    <h1>

        🏛️ Welcome to STFX Trivia

    </h1>


    <p>

        Test your knowledge of StFX, campus life, and more!

    </p>


    <button class="next" id="startButton">

        Start Trivia →

    </button>


</div>



<!-- ========================= -->
<!-- QUIZ SCREEN -->
<!-- ========================= -->

<div id="quiz" style="display:none;">


    <div class="header">

        <h1>

            🏛️ STFX Trivia

        </h1>

    </div>


    <div class="progressText" id="progressText">

    </div>


    <div class="progressBar">

        <div class="progress" id="progress"></div>

    </div>


    <div class="question" id="question">

    </div>


    <div class="answers" id="answers">

    </div>


    <div class="footer">


        <div class="bottom-logos">

            <img src="STFXlogo.png" alt="StFX Logo">

            <img

                src="logo.png"

                alt="Sodexo Logo"

                class="sodexo-bottom">

        </div>


        <div class="buttons">


            <button class="next" id="back">

                ← Back

            </button>


            <button class="next" id="next">

                Next →

            </button>


        </div>


    </div>


</div>


</div>



<script>


/* ========================= */
/* QUESTIONS */
/* ========================= */

const questions = [

    {
        question: "What is the main dining hall at StFX called?",

        answers: [
            "Morrison Hall",
            "Angus L. Macdonald Library",
            "Mulroney Hall",
            "Bishop's Hall"
        ],

        correct: 0
    },


    {
        question: "What year was StFX founded?",

        answers: [
            "1848",
            "1853",
            "1867",
            "1875"
        ],

        correct: 1
    },


    {
        question: "What is the famous ring associated with StFX?",

        answers: [
            "The O-Ring",
            "The Blue Ring",
            "The X-Ring",
            "The Xavier Ring"
        ],

        correct: 2
    },


    {
        question: 'Who is famous for saying the iconic "Go X Go!" chant?',

        answers: [
            "Father Stan",
            "Dr. Andy Hakin",
            "Brian Mulroney",
            "Mark Carney"
        ],

        correct: 0
    },


    {
        question: "Which of the following is NOT currently a residence at StFX?",

        answers: [
            "FX Hall",
            "Cameron Hall",
            "Mount Saint Bernard",
            "Coady Hall"
        ],

        correct: 3
    }

];


/* ========================= */
/* VARIABLES */
/* ========================= */

let currentQuestion = 0;

let selectedAnswers = [];

let inactivityTimer = null;


/* ========================= */
/* START BUTTON */
/* ========================= */

document.getElementById("startButton").addEventListener("click", function(){

    startTrivia();

});


/* ========================= */
/* START TRIVIA */
/* ========================= */

function startTrivia(){

    /* Reset quiz */

    currentQuestion = 0;

    selectedAnswers = [];


    /* Hide welcome */

    document.getElementById("welcome").style.display = "none";


    /* Show quiz */

    document.getElementById("quiz").style.display = "block";


    /* Load first question */

    loadQuestion();


    /* Start 45 second inactivity timer */

    resetInactivityTimer();

}


/* ========================= */
/* RESET 45 SECOND TIMER */
/* ========================= */

function resetInactivityTimer(){

    /* Clear existing timer */

    clearTimeout(inactivityTimer);


    /* Start new 45 second timer */

    inactivityTimer = setTimeout(function(){

        returnToHome();

    },45000);

}


/* ========================= */
/* RETURN TO HOME */
/* ========================= */

function returnToHome(){

    /* Stop timer */

    clearTimeout(inactivityTimer);

    inactivityTimer = null;


    /* Reset quiz */

    currentQuestion = 0;

    selectedAnswers = [];


    /* Hide quiz */

    document.getElementById("quiz").style.display = "none";


    /* Show welcome */

    document.getElementById("welcome").style.display = "block";

}


/* ========================= */
/* LOAD QUESTION */
/* ========================= */

function loadQuestion(){

    const q = questions[currentQuestion];


    /* Question */

    document.getElementById("question").textContent = q.question;


    /* Progress */

    document.getElementById("progressText").textContent =

        "Question " +

        (currentQuestion + 1) +

        " of " +

        questions.length;


    /* Progress Bar */

    document.getElementById("progress").style.width =

        ((currentQuestion + 1) / questions.length) * 100 + "%";


    /* Answer Container */

    const answersContainer = document.getElementById("answers");

    answersContainer.innerHTML = "";


    /* Create Answer Buttons */

    q.answers.forEach(function(answer,index){

        const button = document.createElement("button");


        button.className = "answer";


        button.textContent = answer;


        button.addEventListener("click",function(){

            selectAnswer(index);

        });


        answersContainer.appendChild(button);

    });


    /* Restore Selected Answer */

    if(selectedAnswers[currentQuestion] !== undefined){

        const buttons = document.querySelectorAll(".answer");


        buttons[selectedAnswers[currentQuestion]]

        .classList.add("selected");

    }


    /* Back Button */

    if(currentQuestion === 0){

        document.getElementById("back").style.display = "none";

    }

    else{

        document.getElementById("back").style.display = "block";

    }

}


/* ========================= */
/* SELECT ANSWER */
/* ========================= */

function selectAnswer(index){

    /* Save answer */

    selectedAnswers[currentQuestion] = index;


    /* Remove old selection */

    const buttons = document.querySelectorAll(".answer");


    buttons.forEach(function(button){

        button.classList.remove("selected");

    });


    /* Highlight selected answer */

    buttons[index].classList.add("selected");


    /* Reset timer */

    resetInactivityTimer();

}


/* ========================= */
/* NEXT BUTTON */
/* ========================= */

document.getElementById("next").addEventListener("click",function(){

    /* Reset timer */

    resetInactivityTimer();


    /* Check answer */

    if(selectedAnswers[currentQuestion] === undefined){

        alert("Please select an answer!");

        return;

    }


    /* Next question */

    if(currentQuestion < questions.length - 1){

        currentQuestion++;

        loadQuestion();

        return;

    }


    /* ========================= */
    /* FINISH QUIZ */
    /* ========================= */

    clearTimeout(inactivityTimer);


    let score = 0;


    /* Calculate score */

    questions.forEach(function(q,index){

        if(selectedAnswers[index] === q.correct){

            score++;

        }

    });


    /* Create results */

    let resultsHTML = "";


    questions.forEach(function(q,index){

        const userAnswer = q.answers[selectedAnswers[index]];

        const correctAnswer = q.answers[q.correct];

        const isCorrect =

            selectedAnswers[index] === q.correct;


        resultsHTML += `

            <div class="result-item ${

                isCorrect

                ? "correct-result"

                : "incorrect-result"

            }">


                <div class="result-question">

                    ${isCorrect ? "✅" : "❌"}

                    ${q.question}

                </div>


                <div class="result-answer">

                    <strong>Your answer:</strong>

                    ${userAnswer}

                </div>


                ${

                    !isCorrect

                    ? `

                        <div class="correct-answer">

                            <strong>Correct answer:</strong>

                            ${correctAnswer}

                        </div>

                    `

                    : ""

                }


            </div>

        `;

    });


    /* ========================= */
    /* SHOW RESULTS */
/* ========================= */

    document.querySelector(".container").innerHTML = `

        <div class="results-screen">


            <div class="logos">


                <img

                    src="STFXlogo.png"

                    alt="StFX Logo">


                <img

                    src="logo.png"

                    alt="Sodexo Logo"

                    class="sodexo-logo">


            </div>


            <h1>

                🎉 Trivia Complete!

            </h1>


            <div class="score">

                Your Score:

                ${score}/${questions.length}

            </div>


            <div class="results-list">

                ${resultsHTML}

            </div>


            <button

                class="next"

                id="playAgain">

                Play Again →

            </button>


        </div>

    `;


    /* Start 45 second timer on results */

    inactivityTimer = setTimeout(function(){

        location.reload();

    },45000);


    /* Play Again */

    document.getElementById("playAgain").addEventListener("click",function(){

        clearTimeout(inactivityTimer);

        location.reload();

    });

});


/* ========================= */
/* BACK BUTTON */
/* ========================= */

document.getElementById("back").addEventListener("click",function(){

    /* Reset timer */

    resetInactivityTimer();


    /* Go back */

    if(currentQuestion > 0){

        currentQuestion--;

        loadQuestion();

    }

});


</script>


</body>

</html>
